apiVersion: v1
kind: Service
metadata:
  name: {{ include "trilium.fullname" . }}
  labels:
    {{- include "trilium.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serverTransport.enabled }}
    traefik.ingress.kubernetes.io/service.serverstransport: {{ .Release.Namespace }}-{{ include "trilium.fullname" . }}-transport@kubernetescrd
    {{- end }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "trilium.selectorLabels" . | nindent 4 }}
