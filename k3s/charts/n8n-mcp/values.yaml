image:
  repository: ghcr.io/czlonkowski/n8n-mcp
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Application specific configuration
env:
  MCP_MODE: "http"
  PORT: "3000"
  # AUTH_TOKEN: "your-token"
  # N8N_API_URL: "https://your-n8n-instance.com"
  # N8N_API_KEY: "your-api-key"
  # LOG_LEVEL: "info"
  # N8N_MCP_TELEMETRY_DISABLED: "true"
  # NODE_ENV: "production"
  # NODE_DB_PATH: "/app/data/nodes.db"
  # BUILD_DB_PATH: "/app/data/nodes.db"

extraEnv: []
  # - name: AUTH_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: auth-token

envFrom: []
  # - secretRef:
  #     name: my-secret
  # - configMapRef:
  #     name: my-config

persistence:
  enabled: false
  # storageClass: "-"
  accessMode: ReadWriteOnce
  size: 1Gi
