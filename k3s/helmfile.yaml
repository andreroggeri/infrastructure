repositories:
  - name: nfs-subdir-external-provisioner
    url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
  - name: community-charts
    url: https://community-charts.github.io/helm-charts
  - name: home-assistant
    url: http://pajikos.github.io/home-assistant-helm-chart/
  - name: t3n
    url: https://storage.googleapis.com/t3n-helm-charts
  - name: zigbee2mqtt
    url: https://charts.zigbee2mqtt.io/
  - name: authentik
    url: https://charts.goauthentik.io/
  - name: longhorn
    url: https://charts.longhorn.io
  - name: garage
    url: git+https://git.deuxfleurs.fr/Deuxfleurs/garage.git@script/helm/garage?ref=main-v1
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: wrsys
    url: https://wrsys.github.io/helm-charts/
  - name: ot-helm
    url: https://ot-container-kit.github.io/helm-charts/
  - name: dirsigler
    url: https://dirsigler.github.io/uptime-kuma-helm
  - name: open-webui
    url: https://helm.openwebui.com/
  - name: memo-mcp
    url: https://andreroggeri.github.io/memo-mcp/

releases:
  - name: nfs-provisioner
    namespace: kube-system
    chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
    version: 4.0.18
    values:
      - ./infrastructure/nfs-provisioner/values.yaml

  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: 1.9.1
    values:
      - ./infrastructure/longhorn/values.yaml

  - name: cloudnative-pg
    namespace: cnpg-system
    chart: cnpg/cloudnative-pg
    createNamespace: true
    version: "0.26.0"

  - name: redis-operator
    namespace: redis-operator-system
    createNamespace: true
    chart: ot-helm/redis-operator
    version: 0.18.2

  - name: actual-budget
    namespace: actual-budget
    chart: community-charts/actualbudget
    version: 1.8.7
    values:
      - ./applications/actual-budget/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: actual-http-api
    namespace: actual-budget
    chart: ./charts/actual-http-api
    version: 0.1.0
    values:
      - ./applications/actual-budget/api.values.yaml
    needs:
      - longhorn-system/longhorn
      - actual-budget/actual-budget

  - name: home-assistant
    namespace: home-assistant
    chart: home-assistant/home-assistant
    version: 0.3.26
    values:
      - ./applications/home-assistant/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: mosquitto
    namespace: home-assistant
    chart: t3n/mosquitto
    version: 2.4.1
    values:
      - ./applications/mosquitto/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: zigbee2mqtt
    namespace: home-assistant
    chart: zigbee2mqtt/zigbee2mqtt
    version: 2.4.0
    values:
      - ./applications/z2m/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: authentik
    namespace: authentik
    chart: authentik/authentik
    version: 2025.8.4
    values:
      - ./applications/authentik/values.yaml
      #   - postgresql:
      #       auth:
      #         password: '{{ (get (fromSecret "authentik" "authentik-secrets") "password") | b64dec }}'
    needs:
      - longhorn-system/longhorn

  - name: mqtt-exporter
    namespace: home-assistant
    chart: ./charts/mqtt-exporter
    version: 0.1.1
    values:
      - ./applications/mqtt-exporter/values.yaml

  - name: garage
    namespace: garage
    createNamespace: true
    chart: garage/garage
    values:
      - ./applications/garage/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: n8n
    namespace: n8n
    chart: oci://8gears.container-registry.com/library/n8n
    version: 1.0.15
    values:
      - ./applications/n8n/values.yaml
      - main:
          encryption_key: '{{ exec "kubectl" (list "get" "secret" "n8n-encryption-key-secret" "--namespace" .Namespace "-o" "jsonpath={.data.encryption-key}") | b64dec }}'
    needs:
      - cnpg-system/cloudnative-pg
      - redis-operator-system/redis-operator
      - longhorn-system/longhorn

  - name: evolution-api
    namespace: evolution-api
    chart: ./charts/evolution-api
    version: 0.1.0
    values:
      - ./applications/evolution-api/values.yaml
    needs:
      - cnpg-system/cloudnative-pg
      - longhorn-system/longhorn

  - name: cloudflared
    createNamespace: true
    namespace: cloudflared
    chart: wrsys/cloudflare-tunnel-remote
    version: 0.10.0
    values:
      - ./applications/cloudflared/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: uptime-kuma
    namespace: uptime-kuma
    createNamespace: true
    chart: dirsigler/uptime-kuma
    version: 2.24.0
    values:
      - ./applications/uptime-kuma/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: open-webui
    namespace: open-webui
    createNamespace: true
    chart: open-webui/open-webui
    version: 9.0.0
    values:
      - ./applications/open-webui/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: n8n-mcp
    namespace: n8n
    chart: ./charts/n8n-mcp
    version: 0.1.0
    values:
      - ./applications/n8n-mcp/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: memos
    namespace: memos
    createNamespace: true
    chart: ./charts/memos
    version: 0.1.0
    values:
      - ./applications/memos/values.yaml
    needs:
      - longhorn-system/longhorn

  - name: memo-mcp
    namespace: memos
    chart: memo-mcp/memo-mcp
    version: 0.2.0
    values:
      - ./applications/memo-mcp/values.yaml
    needs:
      - memos/memos
