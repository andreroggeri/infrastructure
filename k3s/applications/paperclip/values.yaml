image:
  repository: ghcr.io/paperclipai/paperclip
  tag: "latest"

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

service:
  type: ClusterIP
  port: 3100

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: paperclip.local.roggeri.com.br
      paths:
        - path: /
          pathType: Prefix

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "3100"
  - name: NODE_ENV
    value: "production"
  - name: PAPERCLIP_HOME
    value: "/paperclip"
  - name: SERVE_UI
    value: "true"
  - name: PAPERCLIP_DEPLOYMENT_MODE
    value: "authenticated"
  - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
    value: "private"
  - name: PAPERCLIP_PUBLIC_URL
    value: "https://paperclip.local.roggeri.com.br"
  - name: PAPERCLIP_MIGRATION_AUTO_APPLY
    value: "true"
  - name: HEARTBEAT_SCHEDULER_ENABLED
    value: "true"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: db-app
        key: uri
  - name: BETTER_AUTH_SECRET
    valueFrom:
      secretKeyRef:
        name: paperclip-secrets
        key: better-auth-secret
  - name: PAPERCLIP_SECRETS_MASTER_KEY
    valueFrom:
      secretKeyRef:
        name: paperclip-secrets
        key: secrets-master-key

resources:
  limits:
    memory: 4096Mi
  requests:
    memory: 1024Mi

extraManifests:
  - apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    metadata:
      name: db
    spec:
      instances: 1
      bootstrap:
        initdb:
          database: paperclip
          owner: paperclip
      resources:
        requests:
          memory: "512Mi"
        limits:
          memory: "512Mi"
      storage:
        size: 2Gi
        storageClass: longhorn
